# 参考1: GitHub Actionsの設定方法
# https://qiita.com/caesar2015/items/139da7e6eacd72b030c8
# 参考2: レンタルサーバにsshする方法
# https://qiita.com/numatti9361/items/5391546e1ef2306517f7
# 参考3: Deploy Keysの設定
# https://qiita.com/tamorieeeen/items/c24f8285448b607b12dd
# 参考4: お名前ドットコムのレンタルサーバにsshで接続する方法
# https://highfivecreate.com/blog/tips/4943.html
# 参考5: appleboy/ssh-action
# https://github.com/appleboy/ssh-action

name: deploy
on:
  push:
    branches:
      - main 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: |
          mkdir -p static/images
          cp -R assets/images/* static/images/ || true
          hugo --minify

      - name: Deploy to Server via rsync
        uses: Burnett01/rsync-deployments@7.0.0
        with:
          switches: -avzr --delete
          path: public/
          remote_path: ~/public_html/yusukekato.jp/
          remote_host: ${{ secrets.SSH_HOST_YUSUKEKATOJP }}
          remote_user: ${{ secrets.SSH_USERNAME_YUSUKEKATOJP }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY_YUSUKEKATOJP }}
          remote_port: ${{ secrets.SSH_PORT_YUSUKEKATOJP }}
