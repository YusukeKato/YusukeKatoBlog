{{- define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  {{- if .Description }}
  <div class="post-description">
    {{ .Description }}
  </div>
  {{- end }}
</header>

<ul class="terms-tags">
  {{- range $key, $value := .Data.Terms }}
  <li>
    <a href="{{ .Page.Permalink }}">{{ .Page.Title | default ($key | markdownify | title) }} <sup><strong><sup>{{ .Count }}</sup></strong></sup> </a>
  </li>
  {{- end }}
</ul>
{{- end }}
